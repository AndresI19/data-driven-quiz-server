# Deploy values for quiz — the Kubernetes Deployment/Service spec for this service. It is consumed at
# deploy time by platform-orchestration's generic `service` chart:
#   helm upgrade quiz <orchestration>/charts/service -n platform -f deploy/quiz.values.yaml \
#     --set image.repo=registry:5000/quiz --set image.tag=<version> --set version=<version>
# The shared boilerplate (securityContext, /tmp mount, labels, probe rendering) lives in the chart's
# platform.app helper; only what varies for this service is here. Image repo/tag + version are set per
# deploy by CI. Keep the `name` field == the Service DNS name the router and sibling services expect.
name: quiz
image:
  repo: platform-quiz
  tag: latest
version: 0.0.0
port: 80
resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    memory: 256Mi
probe:
  path: /cloud-developer-quiz/api/health
  initialDelaySeconds: 3
env:
  - name: PORT
    value: '80'
  - name: BASE_PATH
    value: /cloud-developer-quiz/
  - name: DATABASE_URL
    valueFrom:
      secretKeyRef:
        name: quiz-db
        key: DATABASE_URL
  - name: AUTH_JWKS_URI
    valueFrom:
      configMapKeyRef:
        name: platform-config
        key: AUTH_JWKS_URI
  - name: AUTH_ISSUER
    valueFrom:
      configMapKeyRef:
        name: platform-config
        key: AUTH_ISSUER
  - name: AUTH_AUDIENCE
    value: platform
initContainers:
  - name: seed-cards
    command:
      - sh
      - '-c'
      - 'mkdir -p /content/cards && cp -rn /app/cards/. /content/cards/ && echo "cards on volume: $(ls /content/cards | wc -l)"'
    volumeMounts:
      - name: content
        mountPath: /content
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 128Mi
volumeMounts:
  - name: content
    mountPath: /app/cards
    subPath: cards
volumes:
  - name: content
    persistentVolumeClaim:
      claimName: platform-content
