section:
  key: E
  name: Multi-tenancy / Identity / Policy
  color: "#ec4899"
cards:
  - topic: Multi-tenancy models
    desc: Silo vs. pool vs. bridge — how strongly you isolate one customer's data and compute from another's.
    extras:
      - label: e.g.
        text: silo = separate DB per customer (strong isolation, pricey); pool = one shared DB with a tenant_id column (cheap, noisy-neighbor risk); bridge = shared infra, separate schemas.
      - label: Say
        text: “I'd default to pool for cost at scale, and silo when a customer needs hard data isolation or compliance.”
      - label: Trap
        text: pooled multi-tenancy's big risk is a query missing its tenant_id filter — an instant cross-tenant data leak.
    match:
      - - Silo
        - separate DB per customer — strong isolation, pricey
      - - Pool
        - one shared DB with a tenant_id column — cheap, noisy-neighbor risk
      - - Bridge
        - shared infra, a separate schema per tenant — a middle ground
    hint: Three isolation models — separate DB, shared DB, or something in between.
  - topic: Authentication vs. authorization
    desc: Proving WHO you are (authn) vs. deciding WHAT you're allowed to do (authz).
    cloze:
      text: Proving who you are is authentication; deciding what you may do is {}.
      answer: authorization
      alts:
        - authz
    hint: Proving who you are versus deciding what you're allowed to do.
  - topic: Cookies — and how the backend knows who you are
    desc: HTTP is stateless. A cookie is the server asking the browser to hold a string and hand it back — Set-Cookie on the response, a Cookie header on every matching request after.
    extras:
      - label: e.g.
        text: "POST /login → Set-Cookie: sid=abc123. GET /me → Cookie: sid=abc123 → sessions.get(“abc123”) → {userId: 42}. The cookie carries a KEY, never the user."
      - label: Trap
        text: "browsers attach cookies automatically to any matching request — that is CSRF. Bearer headers are never auto-sent. Either way it's a bearer credential: stealing it is as good as the password. And never trust a JWT's own alg header."
    items:
      - "Set-Cookie: sid=abc123; HttpOnly; Secure; SameSite=Lax; Path=/; Max-Age=1209600"
      - HttpOnly = JS can't read it (XSS) · Secure = HTTPS only · SameSite = not sent cross-site (CSRF) · no Max-Age = dies with the tab
      - "MIDDLEWARE: extract → check integrity (signature) → RESOLVE IDENTITY ←the fork→ check expiry/revocation → attach req.user, else 401"
      - OPAQUE id → sessionStore.get(id) → user row. Instant revoke (DELETE); a lookup every request; replicas need a shared store.
      - SIGNED token (JWT) → verify sig + exp/iss/aud, read claims. No lookup, scales; cannot un-issue → short TTLs or a denylist.
    cloze:
      text: The {} cookie flag stops JavaScript from reading it, mitigating XSS token theft.
      answer: HttpOnly
      alts:
        - http only
    hint: How a stateless protocol remembers who you are between requests.
  - topic: OAuth2 / OIDC / JWT
    desc: "Three pieces of modern auth:"
    items:
      - "OAuth2 (Open Authorization 2.0) — delegation: lets an app act on your behalf via access tokens, no password sharing."
      - "OIDC (OpenID Connect) — an identity layer on OAuth2: proves who you are, returns an ID token."
      - JWT (JSON Web Token) — a signed, self-contained token of claims any service verifies without a DB lookup.
    match:
      - - OAuth2
        - delegation — an app acts on your behalf via access tokens, no password sharing
      - - OIDC
        - an identity layer on OAuth2 — proves who you are, returns an ID token
      - - JWT
        - a signed, self-contained token of claims any service verifies without a DB lookup
    cloze:
      text: "{} is an identity layer built on OAuth2 that returns an ID token proving who you are."
      answer: OIDC
      alts:
        - openid connect
    hint: "Three pieces: delegation, an identity layer on top, and a self-contained signed token."
  - topic: RBAC vs. ABAC
    desc: Two ways to decide 'can this subject do this action?'. RBAC checks WHO YOU ARE (your role); ABAC checks the ATTRIBUTES of the request (who + what + when + where). ABAC is a superset — it can express any RBAC rule plus context — which is why fine-grained policy engines lean toward it.
    extras:
      - label: e.g.
        text: "AWS IAM is the hybrid you'll actually meet: RBAC-style managed policies ('S3ReadOnly') PLUS ABAC conditions like 'only if resource tag team == the user's team.'"
      - label: Say
        text: “Start with RBAC for simplicity; add ABAC conditions when roles start exploding or access must depend on context like ownership, time, or location.”
    table:
      - - ""
        - RBAC
        - ABAC
      - - Decides on
        - the user's role(s)
        - attributes of user + resource + action + context
      - - Rule shape
        - role → allowed actions
        - boolean over attributes
      - - Example
        - "'admins can delete'"
        - "'owner can delete, in business hours, from a corp IP'"
      - - Strength
        - simple, auditable, easy to reason about
        - fine-grained, context-aware, scales to many rules
      - - Weakness
        - role explosion as cases multiply
        - harder to audit 'who can do X?'
    match:
      - - RBAC
        - grants by the user's ROLE — 'admins can delete'
      - - ABAC
        - grants by ATTRIBUTES + context — 'owner can delete from a corp IP in business hours'
      - - Role explosion
        - the RBAC failure mode — a new role per edge case
      - - PBAC / policy-as-code
        - externalize either into an engine (OPA, Cedar) evaluated at request time
    mc:
      - MAC vs DAC (mandatory vs discretionary)
      - ACLs vs capabilities
      - PBAC (policy-based access control)
    cloze:
      text: "'The owner can delete during business hours from a corp IP' is an example of {} access control."
      answer: ABAC
      alts:
        - attribute-based
        - attribute based
    hint: Access by role versus access by attributes and conditions.
  - topic: Policy-as-code (OPA/Rego, Cedar)
    desc: Externalizing authorization rules into an engine you evaluate at runtime — the essence of runtime 'policy enforcement'.
    extras:
      - label: e.g.
        text: OPA (Open Policy Agent) evaluates a Rego rule like 'allow if user.team == resource.owner' at request time; Cedar (AWS) is a similar policy language.
      - label: Say
        text: “Externalize authz into a policy engine so rules are versioned, tested, and enforced consistently — not scattered across each service.”
      - label: Trap
        text: policy-as-code splits the decision (PDP) from enforcement (PEP) — don't hardcode allow/deny in every service.
    cloze:
      text: Open Policy Agent evaluates authorization rules written in the {} language.
      answer: Rego
    hint: Externalize authorization rules into an engine you evaluate at runtime.
  - topic: PEP vs. PDP
    desc: "The two halves of an authorization system: the PDP (Policy Decision Point) evaluates the rules and answers 'allow or deny?'; the PEP (Policy Enforcement Point) sits in the request path and actually enforces that answer."
    extras:
      - label: e.g.
        text: a request hits the API gateway (PEP); it asks an OPA server (PDP) 'can user X delete repo Y?'; OPA says deny, so the gateway returns 403.
    diagram: pep_pdp
    cloze:
      text: The component that evaluates policy and answers allow-or-deny is the {}.
      answer: PDP
      alts:
        - policy decision point
    hint: Two halves — one decides allow/deny, one enforces it in the request path.
  - topic: Secrets management
    desc: Vaulting credentials and keys (HashiCorp Vault, cloud KMS) instead of hardcoding them.
    cloze:
      text: "Secrets management means vaulting credentials and keys in a tool like HashiCorp Vault or a cloud {} instead of hardcoding them."
      answer: "KMS"
      alts:
        - "key management service"
    hint: Where credentials belong instead of hardcoded — a vault or a KMS.
  - topic: Real-time detection & enforcement
    desc: Inspecting agent actions in-flight and blocking or scoring risky ones — the runtime control-plane pitch.
    extras:
      - label: How
        text: "implemented as an interceptor in the tool-call path (proxy / sidecar / SDK hook): every action routes through it, is checked against policy + a risk model, then allowed / blocked / modified in-line and logged for audit."
      - label: e.g.
        text: an agent's delete_database call is intercepted, scored high-risk, and blocked before it runs.
    cloze:
      text: "Runtime enforcement runs as an {} in the tool-call path — proxy, sidecar, or SDK hook — checking each action against policy before it executes."
      answer: "interceptor"
    mc:
      - "Static analysis — scanning code before it runs"
      - "Rate limiting — capping request volume"
      - "Audit logging — recording actions after the fact"
    hint: Inspect agent actions in-flight and block or score the risky ones.
  - topic: "SSO: OIDC vs SAML"
    desc: Both are federation protocols for Single Sign-On — log in once at an Identity Provider (IdP), reach many apps. SAML = older, XML, browser-POST, entrenched in enterprise. OIDC (OpenID Connect) = modern, JSON/JWT, built on OAuth2 — better for APIs, SPAs, mobile.
    extras:
      - label: e.g.
        text: "IdP = Identity Provider (does the login: Okta, Entra ID, Auth0); SP = Service Provider (the app trusting it)."
      - label: Say
        text: “SAML for legacy enterprise SSO, OIDC for anything modern — same idea, the app delegates login to an IdP.”
    cloze:
      text: Older enterprise SSO uses SAML, which encodes its assertions in {}.
      answer: XML
    hint: Two federation protocols for single sign-on — one old/XML, one modern/JWT.
  - topic: ID vs access vs refresh tokens
    desc: "OAuth2 / OIDC issue three token types, each with a different job and audience:"
    extras:
      - label: Trap
        text: don't send the ID token to an API or use the access token to prove identity — different audiences (the `aud` claim). Mixing them is a common bug.
    table:
      - - Token
        - Purpose
        - Audience
      - - ID token
        - proves WHO the user is (OIDC)
        - the client app
      - - Access token
        - authorizes API calls (short-lived)
        - the resource / API
      - - Refresh token
        - get new access tokens, no re-login
        - the auth server
    match:
      - - ID token
        - "proves WHO the user is (OIDC) — audience: the client app"
      - - Access token
        - "authorizes API calls, short-lived — audience: the resource / API"
      - - Refresh token
        - "gets new access tokens without re-login — audience: the auth server"
    cloze:
      text: Don't use an access token to prove identity — that is the job of the {} token.
      answer: ID
      alts:
        - identity
    hint: Three tokens — the key is who each one is FOR (its audience).
  - topic: mTLS & workload identity
    desc: How SERVICES (not users) prove identity to each other. mTLS (mutual TLS) = both client and server present certs, so each authenticates the other. Workload identity gives each service a verifiable identity + auto-rotated certs.
    extras:
      - label: e.g.
        text: SPIFFE/SPIRE issues per-workload SVIDs; a service mesh (Istio/Linkerd) auto-issues + rotates mTLS certs so every pod-to-pod call is authenticated + encrypted.
      - label: Say
        text: “Cloud workload identity (AWS IRSA / GCP Workload Identity) is the same idea for cloud APIs — a pod authenticates with NO static keys.”
    cloze:
      text: "{} TLS has both the client and the server present certificates to authenticate each other."
      answer: Mutual
      alts:
        - mtls
    hint: How services, not users, prove identity to each other.
  - topic: Threat modeling (STRIDE)
    desc: "Systematically enumerating how a system could be attacked BEFORE building defenses. STRIDE is the classic checklist: Spoofing, Tampering, Repudiation, Information disclosure, Denial of service, Elevation of privilege."
    extras:
      - label: How
        text: diagram the data-flow, mark trust boundaries, then walk each element through STRIDE, rate impact × likelihood, and mitigate the high-risk ones.
      - label: e.g.
        text: "for an agent tool call: Spoofing (who invoked it?), Tampering (prompt injection), Elevation (can it reach admin APIs?) — maps straight onto your guardrail design."
      - label: Say
        text: “Threat-model at design time — removing an attack surface is far cheaper than patching it in prod.”
    match:
      - - Spoofing
        - pretending to be a user or system you are not
      - - Tampering
        - modifying data or code in transit or at rest
      - - Repudiation
        - denying you performed an action, with no audit trail to prove it
      - - Information disclosure
        - leaking data to parties not authorized to see it
      - - Denial of service
        - exhausting resources so legitimate users can't get through
      - - Elevation of privilege
        - gaining rights beyond what you were granted
    cloze:
      text: The classic attack-enumeration checklist — Spoofing, Tampering, Repudiation, Info-disclosure, DoS, Elevation — is {}.
      answer: STRIDE
    order:
      - "Diagram the system's data flow"
      - "Mark the trust boundaries on it"
      - "Walk each element through STRIDE (Spoofing … Elevation)"
      - "Rate each threat by impact × likelihood"
      - "Design mitigations for the high-risk ones"
    hint: Enumerate the attacks before defending — a six-letter checklist.

  - topic: "The role comes from the issuer, not the caller"
    desc: "A privilege (admin, tenant, scope) must be decided by the token ISSUER and SIGNED into the token — never asserted by the client and never re-derived by each verifier. The auth service checks its private admin list at mint time and signs `admin: true`; a client cannot ask to be admin, edit the claim, or forge a token, because it doesn't hold the signing key."
    extras:
      - label: Why not check per-service
        text: "If every service re-checked 'is this user an admin?', every service would need the admin list — so the list would be everywhere, which is to say not a secret. Put the answer in the signed token instead."
      - label: Say
        text: "\"The gateway can ENFORCE a policy it isn't allowed to READ, because the decision is already signed into the token.\""
    cloze:
      text: "An authorization claim like admin must be set by the {} and signed, not asserted by the client."
      answer: "issuer"

  - topic: "Pseudonymous identity (deliberately holding no PII)"
    desc: "An identity that ties activity to a stable handle WITHOUT collecting personally identifiable information — no email, no real name. A user is a random id plus a credential, and nothing sensitive sits behind it. The trade: there's no account RECOVERY (recovery needs an email, and an email is PII)."
    cloze:
      text: "A pseudonymous identity ties activity to a stable handle without collecting any {} — no email, no real name — so there is nothing sensitive to breach."
      answer: "PII"
      alts:
        - "personally identifiable information"
    extras:
      - label: Why
        text: "Holding no PII shrinks the blast radius of a breach to near nothing and sidesteps most privacy/consent obligations — a good fit when the data is low-stakes (a game profile), a bad fit for anything real."
      - label: Public vs secret
        text: "Keep the PUBLIC identifier (a display handle, safe to show anywhere) separate from the CREDENTIAL — never print the thing that proves who you are."

  - topic: "Debugging a 403 from the Kubernetes API (kubectl auth can-i)"
    desc: "A pod's app gets 403 Forbidden calling the API — it authenticated fine (the API knew who it was) but RBAC denied the action. Confirm it in one command: `kubectl auth can-i <verb> <resource> --as=system:serviceaccount:<ns>:<sa>` replays the check AS that ServiceAccount and answers yes/no, so you reproduce the denial without the pod."
    extras:
      - label: How
        text: "Fix path: a (Cluster)Role grants the verb on the resource; a (Cluster)RoleBinding binds that Role to the pod's ServiceAccount. Missing EITHER → 403. Namespaced Role+RoleBinding for one namespace; ClusterRole+ClusterRoleBinding for cluster-wide."
      - label: Contrast
        text: "401 Unauthorized = the API didn't believe WHO you are (bad or absent token). 403 Forbidden = it knows who you are but the ROLE lacks the permission. `can-i` diagnoses the 403 case."
      - label: Say
        text: "\"I'd run kubectl auth can-i as the pod's ServiceAccount to confirm it's RBAC, then check that a Role grants the verb AND a RoleBinding actually binds it to that ServiceAccount.\""
    cloze:
      text: "To check whether a ServiceAccount may perform an action, run kubectl auth {} <verb> <resource> --as=system:serviceaccount:<ns>:<sa>."
      answer: "can-i"
    hint: "The pod authenticated but the action was refused — which command replays the permission check as that ServiceAccount?"

  - topic: "OAuth2 / OIDC authorization-code flow, in order"
    desc: "How an app signs a user in through an external identity provider WITHOUT ever seeing their password — the code flow, the default for web apps."
    order:
      - "The app redirects the user to the authorization server's /authorize endpoint"
      - "The user authenticates and consents at the authorization server"
      - "The auth server redirects back to the app with a one-time authorization CODE"
      - "The app's backend POSTs the code (+ client secret / PKCE verifier) to /token"
      - "The auth server returns an ID token and an access token"
      - "The app verifies the ID token's signature and claims, then establishes the session"
    extras:
      - label: Why a code, not the token
        text: "The code returns via the browser redirect (exposed) but is useless without the client secret / PKCE verifier the backend holds — so a leaked code alone grants nothing."
      - label: e.g.
        text: "PKCE (Proof Key for Code Exchange) protects public clients — SPAs and mobile apps that can't keep a secret — with a per-request verifier in the secret's place."
    hint: "redirect → consent → code → back-channel token exchange → verify."
